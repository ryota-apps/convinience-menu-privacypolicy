<!doctype html>
<html lang="ja">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5; url=/convinience-menu-privacypolicy/">
  <title>ページが見つかりません - 今日のコンビニ飯。</title>
  <style type="text/css">
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --text: #20231f;
      --muted: #62675f;
      --border: #dfe4dc;
      --accent: #1f7a4f;
      --link: #0b6bcb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.8;
      letter-spacing: 0;
    }

    .not-found {
      width: min(100% - 32px, 640px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 45px rgba(27, 34, 24, 0.08);
    }

    p:first-child {
      margin: 0 0 10px;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    a {
      color: var(--link);
      font-weight: 700;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <p>今日のコンビニ飯。</p>
    <h1>ページが見つかりません</h1>
    <p>指定されたページは存在しないか、移動した可能性があります。5 秒後にプライバシーポリシーへ移動します。</p>
    <p><a href="/convinience-menu-privacypolicy/">プライバシーポリシーへ戻る</a></p>
  </div>
</body>
</html>
